{% extends "base.html" %}
{% block title %}Emergency Alert – Smart Expressway{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card emergency-card">

    <div class="auth-header">
      <div class="auth-icon">🚨</div>
      <h2>Report an Emergency</h2>
      <p>Help will be dispatched immediately. Stay calm.</p>
    </div>

    <div class="emergency-notice">
      ⚠️ For life-threatening emergencies, call <strong>112</strong> immediately.
    </div>

    <form method="POST" action="{{ url_for('emergency.emergency') }}" class="auth-form">
      <div class="form-group">
        <label for="location">📍 Your Location / Highway</label>
        <input
          type="text"
          id="location"
          name="location"
          placeholder="e.g. NH-48 near Manesar, KM 42"
          required
        />
      </div>

      <div class="form-group">
        <label for="description">📝 Describe the Emergency</label>
        <textarea
          id="description"
          name="description"
          rows="4"
          placeholder="e.g. Vehicle breakdown, accident, medical emergency, road hazard..."
          required
        ></textarea>
      </div>

      <button type="submit" class="btn btn-danger btn-full">
        🚨 Submit Emergency Report
      </button>
    </form>

    <div class="auth-footer">
      <a href="{{ url_for('dashboard.dashboard') }}">← Back to Dashboard</a>
    </div>

  </div>
</div>
{% endblock %}
