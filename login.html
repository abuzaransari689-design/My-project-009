{% extends "base.html" %}
{% block title %}Login – Smart Expressway{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">🔐</div>
      <h2>Welcome Back</h2>
      <p>Sign in to your Expressway account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Enter your username"
          required
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Enter your password"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Login &rarr;
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up free</a></p>
      <p class="hint">Admin? Use <code>admin / admin123</code></p>
    </div>

  </div>
</div>
{% endblock %}
