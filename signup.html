{% extends "base.html" %}
{% block title %}Sign Up – Smart Expressway{% endblock %}

{% block content %}
<div class="auth-page">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-icon">🛣️</div>
      <h2>Create Account</h2>
      <p>Join the Smart Expressway network today</p>
    </div>

    <form method="POST" action="{{ url_for('auth.signup') }}" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="Choose a username"
          required
          minlength="3"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="your@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="Minimum 6 characters"
          required
          minlength="6"
          autocomplete="new-password"
        />
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        Create Account &rarr;
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
    </div>

  </div>
</div>
{% endblock %}
